name: Update profile

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6

      - name: Prepare profile directory
        run: mkdir -p profile

      - name: Generate GitHub stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=transparent&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync DAILY-STUDY dashboard
        shell: python
        run: |
          from pathlib import Path
          from urllib.request import Request, urlopen
          import re
          import textwrap

          owner = "${{ github.repository_owner }}"
          source_url = (
              f"https://raw.githubusercontent.com/"
              f"{owner}/DAILY-STUDY/main/README.md"
          )

          request = Request(
              source_url,
              headers={"User-Agent": "github-profile-dashboard-sync"},
          )

          with urlopen(request, timeout=30) as response:
              daily_readme = response.read().decode("utf-8")

          source_pattern = re.compile(
              r"<!-- STUDY_DASHBOARD:START -->(.*?)"
              r"<!-- STUDY_DASHBOARD:END -->",
              re.DOTALL,
          )
          source_match = source_pattern.search(daily_readme)

          if not source_match:
              raise RuntimeError(
                  "DAILY-STUDY READMEмЧРмДЬ лМАмЛЬл≥ілУЬ лІИмї§л•Љ м∞ЊмІА л™їнЦИмКµлЛИлЛ§."
              )

          source = source_match.group(1)

          metric_pattern = re.compile(
              r"\|\s*\*\*(\d+мЭЉ)\*\*\s*"
              r"\|\s*\*\*(\d+мЭЉ)\*\*\s*"
              r"\|\s*\*\*(\d+мЭЉ)\*\*\s*"
              r"\|\s*\*\*(\d+к∞Ь)\*\*\s*\|"
          )
          metric_match = metric_pattern.search(source)

          if not metric_match:
              raise RuntimeError(
                  "DAILY-STUDY READMEмЧРмДЬ нХЩмКµ мІАнСЬл•Љ м∞ЊмІА л™їнЦИмКµлЛИлЛ§."
              )

          current_streak, longest_streak, completed_days, completed_questions = (
              metric_match.groups()
          )

          recent_pattern = re.compile(
              r"\|\s*лВ†мІЬ\s*\|\s*AI¬Ј(?:DA|Data)\s*\|\s*Backend\s*\|\s*\n"
              r"\|[^\n]+\|\s*\n"
              r"(?P<rows>(?:\|[^\n]+\|\s*\n?)*)",
              re.MULTILINE,
          )
          recent_match = recent_pattern.search(source)

          if not recent_match:
              raise RuntimeError(
                  "DAILY-STUDY READMEмЧРмДЬ мµЬкЈЉ нХЩмКµ нСЬл•Љ м∞ЊмІА л™їнЦИмКµлЛИлЛ§."
              )

          recent_rows = recent_match.group("rows").strip() or "| - | - | - |"

          recent_rows = recent_rows.replace(
              "](notes/",
              f"](https://github.com/{owner}/DAILY-STUDY/blob/main/notes/",
          )

          dashboard = f"""
          ### нХЩмКµ нШДнЩ©

          <div align="center">
          <table>
            <tr>
              <td align="center" width="150">
                <strong>рЯФ• нШДмЮђ мК§нКЄл¶≠</strong><br>
                <sub><strong>{current_streak}</strong></sub>
              </td>
              <td align="center" width="150">
                <strong>рЯПЖ мµЬмЮ• мК§нКЄл¶≠</strong><br>
                <sub><strong>{longest_streak}</strong></sub>
              </td>
              <td align="center" width="150">
                <strong>рЯУЕ мЩДл£МнХЬ нХЩмКµмЭЉ</strong><br>
                <sub><strong>{completed_days}</strong></sub>
              </td>
              <td align="center" width="150">
                <strong>рЯІ† мЩДл£МнХЬ мІИлђЄ</strong><br>
                <sub><strong>{completed_questions}</strong></sub>
              </td>
            </tr>
          </table>
          </div>

          <br>

          ### мµЬкЈЉ нХЩмКµ

          | лВ†мІЬ | AI¬ЈDA | Backend |
          |---|---|---|
          {recent_rows}
          """

          dashboard = textwrap.dedent(dashboard).strip()

          profile_path = Path("README.md")
          profile_readme = profile_path.read_text(encoding="utf-8")

          target_pattern = re.compile(
              r"<!-- DAILY_STUDY:START -->.*?"
              r"<!-- DAILY_STUDY:END -->",
              re.DOTALL,
          )

          replacement = (
              "<!-- DAILY_STUDY:START -->\n"
              f"{dashboard}\n"
              "<!-- DAILY_STUDY:END -->"
          )

          if not target_pattern.search(profile_readme):
              raise RuntimeError(
                  "нФДл°ЬнХД READMEмЧРмДЬ DAILY_STUDY лІИмї§л•Љ м∞ЊмІА л™їнЦИмКµлЛИлЛ§."
              )

          updated = target_pattern.sub(replacement, profile_readme)
          profile_path.write_text(updated, encoding="utf-8")

      - name: Commit generated profile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md profile/*.svg

          if git diff --cached --quiet; then
            echo "No profile changes."
            exit 0
          fi

          git commit -m "chore: update profile stats and study dashboard"
          git push
